# This sample uses Kconfig.defaults to set options common for all
# samples. This file should contain only options specific for this sample
# or overrides of default values.

# Enable CHIP
CONFIG_CHIP=y
CONFIG_CHIP_PROJECT_CONFIG="src/chip_project_config.h"
CONFIG_CHIP_DEVICE_PRODUCT_NAME="Matter Bridge"

# Configure ZAP file name
CONFIG_NCS_SAMPLE_MATTER_ZAP_FILE_PATH="${APPLICATION_CONFIG_DIR}/src/default_zap/bridge.zap"

# 32770 == 0x8002 (example bridge)
CONFIG_CHIP_DEVICE_PRODUCT_ID=32770
CONFIG_STD_CPP17=y

# Enable Matter pairing automatically on application start.
CONFIG_CHIP_ENABLE_PAIRING_AUTOSTART=y

# Enable Matter extended announcement and increase duration to 1 hour.
CONFIG_CHIP_BLE_EXT_ADVERTISING=y
CONFIG_CHIP_BLE_ADVERTISING_DURATION=60

# Add support for LEDs and buttons on Nordic development kits
CONFIG_DK_LIBRARY=y

# Bluetooth Low Energy configuration
CONFIG_BT_DEVICE_NAME="MatterBridge"

# Other settings
CONFIG_THREAD_NAME=y
CONFIG_MPU_STACK_GUARD=y
CONFIG_RESET_ON_FATAL_ERROR=n
CONFIG_CHIP_LIB_SHELL=y
CONFIG_NCS_SAMPLE_MATTER_TEST_SHELL=y

# Reduce assert verbosity to save flash space.
CONFIG_ASSERT_NO_FILE_INFO=y

# Disable NFC onboarding
CONFIG_CHIP_NFC_ONBOARDING_PAYLOAD=n

# Reduce application size
CONFIG_USE_SEGGER_RTT=n

# Enable Factory Data feature
CONFIG_CHIP_FACTORY_DATA=y
CONFIG_CHIP_FACTORY_DATA_BUILD=y

# Increase heap size to accommodate the memory required for additional bridged devices.
CONFIG_CHIP_MALLOC_SYS_HEAP_SIZE=16384

CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_LOG=y
CONFIG_GLIBCXX_LIBCPP=y
CONFIG_MODBUS=y
CONFIG_MODBUS_ROLE_CLIENT=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_MAIN_STACK_SIZE=8192

#statyczy konfig do odhashowania z parametrami datasetu
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_IEEE802154=y

CONFIG_SETTINGS=y
CONFIG_CHIP_ENABLE_PAIRING_AUTOSTART=y
# CONFIG_CHIP_OPERATIONAL_DATA_STORE_FILESYSTEM=y jebane nie dzial a jest potrzebne chyba
CONFIG_OPENTHREAD_NETWORK_NAME="OpenThread-035a"
CONFIG_OPENTHREAD_PANID=868
CONFIG_OPENTHREAD_CHANNEL=24

# Wymagane podsystemy, których żąda wygenerowany kod Matter


# Wsparcie dla tabeli powiązań i powłoki diagnostycznej
CONFIG_CHIP_LIB_SHELL=y
CONFIG_CHIP_WIFI=n

# # Pełne wsparcie dla modułu aktualizacji (OTA) i pobierania blokowego (BDX)
CONFIG_CHIP_OTA_REQUESTOR=n

CONFIG_CHIP_CRYPTO_PSA=y

# # Włączenie podsystemu aktualizacji OTA oraz pobierania BDX (czego szuka linker)
